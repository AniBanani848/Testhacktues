<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>StudyHub</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: #f5f7fb;
    }

    .hero {
      height: 90vh;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
    }
  </style>
</head>

<body>

  <!-- NAVBAR -->
  <nav class="navbar navbar-dark bg-dark px-4">
    <span class="navbar-brand">📚 StudyHub</span>

    <!-- Menu -->
    <ul class="navbar-nav flex-row ms-3">
      <li class="nav-item me-3">
        <a class="nav-link text-light" href="math.html">Math</a>
      </li>
      <li class="nav-item me-3">
        <a class="nav-link text-light" href="cs.html">CS</a>
      </li>
      <li class="nav-item me-3">
        <a class="nav-link text-light" href="history.html">History</a>
      </li>
    </ul>

    <!-- Buttons -->
    <div>
      <button class="btn btn-outline-light" data-bs-toggle="modal" data-bs-target="#loginModal">
        Login
      </button>

      <button class="btn btn-primary ms-2" data-bs-toggle="modal" data-bs-target="#registerModal">
        Register
      </button>
    </div>
  </nav>

  <!-- HERO -->
  <div class="hero text-center">
    <h1 class="fw-bold">Learn smarter, together</h1>
    <p class="text-muted">Споделяй материали и откривай нови знания</p>
  </div>

  <!-- LOGIN MODAL -->
  <div class="modal fade" id="loginModal">
    <div class="modal-dialog">
      <div class="modal-content">

        <div class="modal-header">
          <h5 class="modal-title">Login</h5>
          <button class="btn-close" data-bs-dismiss="modal"></button>
        </div>

        <div class="modal-body">
          <form>
            <input type="text" class="form-control mb-3" placeholder="Username">
            <input type="password" class="form-control mb-3" placeholder="Password">
            <button class="btn btn-primary w-100">Login</button>
          </form>
        </div>

      </div>
    </div>
  </div>

  <!-- REGISTER MODAL -->
  <div class="modal fade" id="registerModal">
    <div class="modal-dialog">
      <div class="modal-content">

        <div class="modal-header">
          <h5 class="modal-title">Register</h5>
          <button class="btn-close" data-bs-dismiss="modal"></button>
        </div>

        <div class="modal-body">
          <form>

            <input type="text" class="form-control mb-3" placeholder="Име">
            <input type="password" class="form-control mb-3" placeholder="Парола">
            <input type="text" class="form-control mb-3" placeholder="Клас / Университет">

            <button class="btn btn-success w-100">Register</button>

          </form>
        </div>

      </div>
    </div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
