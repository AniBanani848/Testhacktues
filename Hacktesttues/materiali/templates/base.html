<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% block title %}StudyLink{% endblock %}</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
    body {
        background-color: #f0f4f8;
        font-family: 'Segoe UI', sans-serif;
    }
    .center-card {
        max-width: 850px;
        margin: 5vh auto;
        padding: 2rem;
        border-radius: 1rem;
        background-color: #fff;
        box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }
    .center-card h2 {
        font-weight: 600;
        margin-bottom: 1.5rem;
        color: #333;
        text-align: center;
    }
    .form-control:focus {
        border-color: #5a67d8;
        box-shadow: 0 0 0 0.2rem rgba(90,103,216,.25);
    }
    .btn-primary {
        background-color: #5a67d8;
        border: none;
        font-weight: 500;
        padding: 0.5rem 1.5rem;
        border-radius: 0.5rem;
    }
    .btn-primary:hover {
        background-color: #434190;
    }
    .text-muted {
        font-size: 0.9rem;
        text-align: center;
        margin-top: 1rem;
    }
</style>
</head>
<body>

<div class="center-card">
    <h2>Welcome Back</h2>

    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-{% if 'error' in message.tags %}danger{% elif 'success' in message.tags %}success{% elif 'warning' in message.tags %}warning{% else %}info{% endif %} alert-dismissible fade show" role="alert">
                {{ message }}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
        {% endfor %}
    {% endif %}
    {% block content %}{% endblock %}

    <p class="text-muted">
        Don't have an account? <a href="{% url 'register' %}">Sign up</a>
    </p>
    <div class="d-grid mt-3" style="max-width: 350px; margin: 0 auto;">
        <form method="POST" action="{% url 'logout' %}">
            {% csrf_token %}
            <button type="submit" class="btn btn-outline-danger w-100">
                Log Out
            </button>
        </form>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
