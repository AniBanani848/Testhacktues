{% extends "base.html" %}
{% block title %}Delete material — StudyLink{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card border-danger shadow-sm">
            <div class="card-body p-4">
                <h1 class="h5 text-danger">Delete this material?</h1>
                <p class="mb-4"><strong>{{ resource.title }}</strong> ({{ resource.subject }})</p>
                <form method="post">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger">Yes, delete</button>
                    <a href="{% url 'resource_list' %}" class="btn btn-outline-secondary">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
